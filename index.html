<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字學習工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60d0f0;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --error: #f06060;
    --success: #60f0a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    padding: 40px 0 32px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Tab Switch */
  .tab-switch {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* Text Input */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* Image Upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200, 240, 96, 0.04);
  }

  .upload-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-btn:hover {
    border-color: var(--accent);
  }

  .upload-icon {
    font-size: 2rem;
    margin-bottom: 8px;
  }

  .upload-zone p {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .upload-zone strong {
    color: var(--accent);
  }

  #preview-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview-item button {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: white;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .submit-btn:hover { background: #d4f570; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* Progress */
  #progress-section {
    display: none;
  }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 999px;
    height: 6px;
    margin: 12px 0;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* Log */
  #log {
    display: none;
    max-height: 300px;
    overflow-y: auto;
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    margin-top: 12px;
  }

  .log-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .log-item:last-child { border-bottom: none; }

  .log-item .status { flex-shrink: 0; }
  .log-item .word { color: var(--accent2); }
  .log-item .info { color: var(--muted); font-size: 0.72rem; }
  .log-item.error .word { color: var(--error); }
  .log-item.success .word { color: var(--success); }

  /* Result Summary */
  #summary {
    display: none;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }

  .summary-stat {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .summary-stat .num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
  }

  .summary-stat .num.green { color: var(--success); }
  .summary-stat .num.red { color: var(--error); }

  .summary-stat .label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--text); color: var(--text); }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>單字 <span>Vault</span></h1>
    <p>// auto → gemini → sheets</p>
  </header>

  <!-- Input Card -->
  <div class="card" id="input-section">
    <div class="card-label">✏️ 文字輸入</div>
    <textarea id="word-input" placeholder="輸入單字，以逗號分隔&#10;例如：serendipity, ephemeral, eloquent"></textarea>
    <p class="hint">支援中英文混合，空格會自動清除</p>

    <div class="card-label" style="margin-top:20px;">📷 圖片辨識</div>
    <label for="file-input" style="display:block; background:var(--surface2); color:var(--text); text-align:center; padding:14px; border-radius:12px; font-size:1rem; cursor:pointer; border:1px solid var(--border); font-family:'DM Sans',sans-serif;">
      點此選擇圖片（支援多張）
    </label>
    <input type="file" accept="image/*" multiple id="file-input" style="display:none" onchange="handleFiles(this.files)">
    <div id="preview-container"></div>

    <button class="submit-btn" id="submit-btn" onclick="startProcess()">
      開始生成並寫入 Google Sheet
    </button>
  </div>

  <!-- Progress Card -->
  <div class="card" id="progress-section">
    <div class="card-label">處理中</div>
    <div class="progress-text" id="progress-text">準備中...</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="log"></div>
  </div>

  <!-- Summary Card -->
  <div class="card" id="summary">
    <div class="card-label">完成</div>
    <div class="summary-grid">
      <div class="summary-stat">
        <div class="num green" id="success-count">0</div>
        <div class="label">成功寫入</div>
      </div>
      <div class="summary-stat">
        <div class="num red" id="error-count">0</div>
        <div class="label">失敗</div>
      </div>
    </div>
    <button class="reset-btn" onclick="reset()">再輸入一批</button>
  </div>
</div>

<script>
const GEMINI_API_KEY = 'AIzaSyDKbOj_YY1imt94ADJU_Zj_UDwnXaDq5es';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-54mJkfd9-1RtG_IqWj0NS1fO91wjQJlbem65dzJtnryVMkHqCBLaSvTblh0WdR0Z/exec';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_API_KEY}`;

const SYSTEM_PROMPT = `你是英語詞彙分析助手。請只回傳 JSON，不要加任何多餘文字或markdown，格式如下：{"Word": "", "Phonetic": "", "Translation": "", "Root": "", "Synonyms": "", "Collocations": "", "Example_EN": "", "Example_CH": ""}。其中 "Root" 指的是這個單字的拉丁文或希臘文字根（morpheme），例如 "port" 來自拉丁文 "portare"（攜帶），請列出字根本身＋來源語言＋原始意義，不要寫單字的歷史或起源故事。`;

let currentTab = 'text';
let uploadedImages = [];
let successCount = 0;
let errorCount = 0;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'image'));
  });
  document.getElementById('tab-text').classList.toggle('active', tab === 'text');
  document.getElementById('tab-image').classList.toggle('active', tab === 'image');
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedImages.push({ file, dataUrl: e.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  const container = document.getElementById('preview-container');
  container.innerHTML = uploadedImages.map((img, i) => `
    <div class="preview-item">
      <img src="${img.dataUrl}">
      <button onclick="removeImage(${i})">✕</button>
    </div>
  `).join('');
}

function removeImage(index) {
  uploadedImages.splice(index, 1);
  renderPreviews();
}

function addLog(word, status, info = '') {
  const log = document.getElementById('log');
  log.style.display = 'block';
  const div = document.createElement('div');
  div.className = `log-item ${status}`;
  div.innerHTML = `
    <span class="status">${status === 'success' ? '✅' : status === 'error' ? '❌' : '⏳'}</span>
    <div>
      <div class="word">${word}</div>
      ${info ? `<div class="info">${info}</div>` : ''}
    </div>
  `;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function setProgress(current, total) {
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `處理中 ${current} / ${total} 個單字`;
}

async function extractWordsFromImage(imageDataUrl) {
  const base64 = imageDataUrl.split(',')[1];
  const mimeType = imageDataUrl.split(';')[0].split(':')[1];

  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { text: '這是一本英文單字書的頁面。請只找出字體最大、最粗的標題單字（通常是該頁的主要詞彙），忽略所有說明文字、例句、音標、翻譯等小字內容。只回傳以逗號分隔的單字列表，不要加其他說明。' },
          { inline_data: { mime_type: mimeType, data: base64 } }
        ]
      }]
    })
  });

  const data = await res.json();
  const text = data.candidates[0].content.parts[0].text;
  return text.split(',').map(w => w.trim().replace(/["""]/g, '')).filter(w => w);
}

async function analyzeBatch(words, retries = 3) {
  const batchPrompt = `請分析以下 ${words.length} 個英文單字，回傳 JSON array，每個元素格式為 {"Word":"","Phonetic":"","Translation":"","Root":"","Synonyms":"","Collocations":"","Example_EN":"","Example_CH":""}。Root 指拉丁文或希臘文字根（morpheme），列出字根本身＋來源語言＋原始意義。只回傳 JSON array，不要加任何說明或 markdown。

單字列表：${words.join(', ')}`;

  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      const res = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: batchPrompt }] }]
        })
      });

      const data = await res.json();

      if (res.status === 429) {
        await new Promise(r => setTimeout(r, (attempt + 1) * 15000));
        continue;
      }

      if (!data.candidates || !data.candidates[0]) {
        throw new Error('Gemini 無回應，請稍後再試');
      }

      const raw = data.candidates[0].content.parts[0].text;
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      return Array.isArray(parsed) ? parsed : [parsed];

    } catch (e) {
      if (attempt === retries - 1) throw e;
      await new Promise(r => setTimeout(r, 8000));
    }
  }
}

async function startProcess() {
  let words = [];

  // 文字輸入
  const input = document.getElementById('word-input').value;
  const textWords = input.split(',').map(w => w.trim().replace(/["""]/g, '')).filter(w => w);
  words.push(...textWords);

  // 圖片辨識
  if (uploadedImages.length > 0) {
    document.getElementById('input-section').style.display = 'none';
    document.getElementById('progress-section').style.display = 'block';
    document.getElementById('progress-text').textContent = '正在辨識圖片中的單字...';

    for (let i = 0; i < uploadedImages.length; i++) {
      addLog(`圖片 ${i + 1}`, 'pending', '辨識中...');
      try {
        const extracted = await extractWordsFromImage(uploadedImages[i].dataUrl);
        words.push(...extracted);
        document.querySelector('#log .log-item:last-child').className = 'log-item success';
        document.querySelector('#log .log-item:last-child .word').textContent = `圖片 ${i + 1}`;
        document.querySelector('#log .log-item:last-child .info').textContent = `辨識到：${extracted.join(', ')}`;
      } catch (e) {
        addLog(`圖片 ${i + 1}`, 'error', e.message);
      }
    }
  }

  if (words.length === 0) return alert('請輸入單字或上傳圖片');

  document.getElementById('input-section').style.display = 'none';
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;

  successCount = 0;
  errorCount = 0;

  const today = new Date().toISOString().split('T')[0];
  const results = [];

  const BATCH_SIZE = 5;
  for (let i = 0; i < words.length; i += BATCH_SIZE) {
    const batch = words.slice(i, i + BATCH_SIZE);
    setProgress(i, words.length);
    addLog(`批次 ${Math.floor(i/BATCH_SIZE)+1}（${batch.join(', ')}）`, 'pending', '生成中...');

    try {
      const batchData = await analyzeBatch(batch);
      batchData.forEach(data => {
        data.Date = today;
        Object.keys(data).forEach(k => {
          if (typeof data[k] === 'string') data[k] = data[k].replace(/^=/, '');
        });
        results.push(data);
        successCount++;
      });
      const lastLog = document.querySelector('#log .log-item:last-child');
      lastLog.className = 'log-item success';
      lastLog.querySelector('.info').textContent = batchData.map(d => `${d.Word} ${d.Translation}`).join(' / ');
    } catch (e) {
      const lastLog = document.querySelector('#log .log-item:last-child');
      lastLog.className = 'log-item error';
      lastLog.querySelector('.info').textContent = e.message;
      errorCount += batch.length;
    }

    if (i + BATCH_SIZE < words.length) await new Promise(r => setTimeout(r, 5000));
  }

  setProgress(words.length, words.length);
  document.getElementById('progress-text').textContent = '寫入 Google Sheet...';

  // Write to Google Sheet
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: results })
    });
  } catch (e) {
    console.error('Sheet write error:', e);
  }

  document.getElementById('success-count').textContent = successCount;
  document.getElementById('error-count').textContent = errorCount;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('progress-text').textContent = '完成！';
}

function reset() {
  document.getElementById('input-section').style.display = 'block';
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('log').innerHTML = '';
  document.getElementById('log').style.display = 'none';
  document.getElementById('word-input').value = '';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('submit-btn').disabled = false;
  uploadedImages = [];
  renderPreviews();
}

// Drag & drop
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
</script>
</body>
</html>
